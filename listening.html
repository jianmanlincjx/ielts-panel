<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>雅思听力考词 · 学习面板</title>
<style>
  :root{
    --bg:#f4f6fa; --card:#fff; --line:#e6e9f0; --box:#eef1f6;
    --txt:#1e2330; --dim:#8990a4; --green:#22c55e; --greenBd:#86efac;
    --red:#ef4444; --accent:#6c5ce7; --accent2:#8b7cf6; --amber:#f59e0b;
    --sh:0 2px 10px rgba(30,40,80,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--txt)}
  .topbar{background:rgba(244,246,250,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:14px 24px;display:flex;align-items:center;gap:16px}
  .brand{font-weight:800;font-size:18px;display:flex;align-items:center;gap:8px;cursor:pointer;flex:0 0 auto}
  .crumb{display:flex;align-items:center;gap:8px;flex:1;min-width:0;overflow:hidden;flex-wrap:nowrap}
  .crumb a,.crumb .cur{display:inline-flex;align-items:center;gap:5px;font-size:14px;font-weight:600;border-radius:9px;
    padding:6px 13px;white-space:nowrap;line-height:1;text-decoration:none;transition:.15s}
  .crumb a{background:#eef0f6;color:#5b6274;cursor:pointer;border:1px solid transparent}
  .crumb a:hover{background:#e3e6f5;color:var(--accent);border-color:var(--accent2)}
  .crumb .cur{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
    box-shadow:0 2px 8px rgba(108,92,231,.35);overflow:hidden;text-overflow:ellipsis;max-width:340px}
  .crumb .sep{color:#c3c8d4;font-size:14px;flex:0 0 auto}
  .btn{background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 16px;font-size:15px;cursor:pointer;font-weight:600;color:var(--txt)}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none}
  .btn.sm{padding:6px 12px;font-size:13px}
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:transparent}
  .wrap{max-width:1080px;margin:0 auto;padding:20px}
  .hidden{display:none!important}

  /* dashboard hero */
  .hero{display:flex;gap:24px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px 26px;box-shadow:var(--sh);flex-wrap:wrap}
  .ring{--p:0;--c:var(--accent);width:104px;height:104px;border-radius:50%;flex:0 0 auto;
    background:conic-gradient(var(--c) calc(var(--p)*1%),#e9ecf3 0);display:grid;place-items:center;position:relative}
  .ring::after{content:'';position:absolute;inset:11px;background:var(--card);border-radius:50%}
  .ring .val{position:relative;z-index:1;font-weight:800;font-size:22px}
  .ring .val small{font-size:12px;color:var(--dim);font-weight:600}
  .heroInfo{flex:1;min-width:220px}
  .heroInfo h1{margin:0 0 4px;font-size:20px}
  .heroStats{display:flex;gap:22px;flex-wrap:wrap;margin-top:10px}
  .stat{font-size:13px;color:var(--dim)}
  .stat b{display:block;font-size:20px;color:var(--txt)}
  .heroActs{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}

  .sectitle{font-size:15px;font-weight:700;margin:26px 4px 12px;display:flex;align-items:center;gap:8px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .chcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--sh);cursor:pointer;transition:.15s;display:flex;gap:14px;align-items:center}
  .chcard:hover{transform:translateY(-2px);border-color:var(--accent2)}
  .miniring{--p:0;--c:var(--accent);width:56px;height:56px;border-radius:50%;flex:0 0 auto;
    background:conic-gradient(var(--c) calc(var(--p)*1%),#e9ecf3 0);display:grid;place-items:center;position:relative}
  .miniring::after{content:'';position:absolute;inset:7px;background:var(--card);border-radius:50%}
  .miniring .e{position:relative;z-index:1;font-size:22px}
  .chmeta{flex:1;min-width:0}
  .chmeta .n{font-weight:700;font-size:15px}
  .chmeta .s{color:var(--dim);font-size:12.5px;margin-top:3px}
  .bar{height:6px;background:#e9ecf3;border-radius:99px;overflow:hidden;margin-top:8px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:.4s}
  .bar.g>i{background:linear-gradient(90deg,#34d399,#22c55e)}
  .segbar{display:flex;height:7px;background:#e9ecf3;border-radius:99px;overflow:hidden;margin-top:8px}
  .segbar>span{display:block;height:100%;transition:.4s}
  .accpill{font-size:12px;font-weight:700;color:var(--dim);background:#eef1f6;border-radius:99px;padding:2px 9px;white-space:nowrap}
  .accpill.good{color:#16a34a;background:#e9f9ef} .accpill.bad{color:#dc2626;background:#fdeaea}

  /* topic list (chapter drill-down) */
  .toprow{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--sh);margin-bottom:10px;display:flex;align-items:center;gap:14px}
  .toprow .tinfo{flex:1;min-width:0}
  .toprow .tn{font-weight:700;font-size:15px}
  .toprow .ts{color:var(--dim);font-size:12.5px;margin-top:2px}
  .pctbadge{font-weight:800;font-size:15px;min-width:44px;text-align:right}
  .pctbadge.done{color:var(--green)}

  /* practice header */
  .stickyhead{position:sticky;top:0;z-index:30}
  .pbar{background:var(--card);border-bottom:1px solid var(--line);padding:12px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .pg-progress{display:flex;align-items:center;gap:14px;flex:1 1 240px;min-width:200px}
  .track{flex:1;height:10px;background:#e2e5ea;border-radius:99px;overflow:hidden;min-width:80px}
  .track>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd93d,#ffb703);transition:.3s}
  .count{font-weight:800;font-size:18px;min-width:66px;text-align:center;letter-spacing:.5px}
  .pg-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .toggles{display:flex;align-items:center;gap:12px}
  .chk{display:inline-flex;align-items:center;gap:7px;font-size:15px;cursor:pointer;user-select:none;color:var(--txt)}
  .chk input{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}
  .pbar select{border:1px solid var(--line);border-radius:9px;padding:6px 10px;font-size:14px;background:#fff;color:var(--txt);cursor:pointer}
  .seg{display:inline-flex;background:#e7e9ee;border-radius:12px;padding:4px}
  .seg button{border:none;background:transparent;padding:9px 22px;border-radius:9px;font-size:15px;font-weight:700;color:var(--dim);cursor:pointer;transition:.15s}
  .seg button.on{background:#fff;color:var(--txt);box-shadow:0 1px 4px rgba(0,0,0,.14)}
  .vdiv{width:1px;height:24px;background:var(--line)}
  .kbdhint{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--dim)}
  kbd{background:#fff;border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:2px 7px;font-size:12px}

  /* list mode */
  .list{max-width:1180px;margin:8px auto 60px;padding:0 20px}
  .item{display:flex;align-items:center;gap:14px;padding:9px 0}
  .idx{color:var(--dim);font-size:13px;width:30px;text-align:right;flex:0 0 auto}
  .prompt{flex:0 0 40%;max-width:500px;background:var(--box);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;min-height:58px}
  .spk{font-size:20px;cursor:pointer;opacity:.7;flex:0 0 auto}.spk:hover{opacity:1}
  .p-en{font-size:18px;font-weight:600}.p-cn{font-size:18px;color:#4b5162}
  .p-both .p-en{margin-right:auto}
  .prompt .placeholder{color:var(--dim);font-size:14px}
  .dots{display:inline-flex;gap:3px;flex:0 0 auto;margin-left:auto}
  .dots i{width:7px;height:7px;border-radius:50%;background:#d3d8e3}
  .dots i.f{background:var(--amber)} .dots i.m{background:var(--green)}
  .ansfield{flex:1;position:relative}
  .ansfield input{width:100%;border:2px solid var(--greenBd);border-radius:12px;padding:14px 48px 14px 18px;font-size:18px;background:#fff;outline:none;color:var(--txt)}
  .ansfield input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.12)}
  .ansfield.correct input{border-color:var(--green);background:#f0fdf4}
  .ansfield.wrong input{border-color:var(--red);background:#fef2f2}
  .cat{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:22px;pointer-events:none}
  .mark{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:19px;font-weight:700}
  .correct .mark{color:var(--green)}.wrong .mark{color:var(--red)}
  .sol{font-size:13px;color:var(--red);margin-top:4px}.sol b{color:var(--green)}

  /* immersive */
  .imm{max-width:600px;margin:26px auto;padding:0 20px;text-align:center}
  .imm .topic{color:var(--accent);font-size:13px;margin-bottom:14px}
  .imm .bigspk{font-size:64px;cursor:pointer;user-select:none;display:inline-block}.imm .bigspk:active{transform:scale(.9)}
  .imm .immcn{font-size:24px;color:#4b5162;min-height:32px;margin:12px 0}
  .imm .immen{font-size:19px;color:var(--dim);min-height:24px;letter-spacing:1px}
  .imm input{width:100%;max-width:420px;text-align:center;font-size:24px;letter-spacing:1px;padding:15px;border-radius:14px;border:2px solid var(--greenBd);background:#fff;color:var(--txt);margin:16px auto;display:block;outline:none}
  .imm input.correct{border-color:var(--green);background:#f0fdf4}.imm input.wrong{border-color:var(--red);background:#fef2f2}
  .imm .fb{min-height:34px;font-size:19px;font-weight:700;margin:6px 0}
  .imm .fb .ok{color:var(--green)}.imm .fb .bad{color:var(--red);text-decoration:line-through;font-weight:400;font-size:16px;margin-left:8px}
  .imm .ctrls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px}

  .result{max-width:600px;margin:26px auto;padding:0 20px}
  .result .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px;text-align:center;box-shadow:var(--sh)}
  .score{font-size:32px;font-weight:800;margin:6px 0}
  .review{text-align:left;margin-top:14px}
  .rw{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--line);font-size:15px}
  .rw .ok{color:var(--green);font-weight:600}.rw .your{color:var(--red)}
  @media(max-width:640px){.prompt{flex-basis:44%}.p-en,.p-cn{font-size:15px}.heroActs{width:100%}}

.copyright{max-width:1180px;margin:36px auto 28px;padding:0 20px;text-align:center;color:#9aa3b8;font-size:12.5px;line-height:1.7}
.copyright a{color:inherit}
</style>
</head>
<body>
<div class="stickyhead">
<div class="topbar">
  <a href="index.html" style="text-decoration:none;color:#5b6274;font-size:13px;font-weight:600;background:#eef0f6;padding:6px 12px;border-radius:9px;flex:0 0 auto">← 面板</a>
  <span class="brand" id="homeBtn">🐤 考词面板</span>
  <span class="crumb" id="crumb"></span>
</div>

<!-- practice control bar (only visible during practice) -->
<div class="pbar hidden" id="pbar">
  <div class="pg-progress">
    <span class="count" id="count">0/0</span>
    <div class="track" id="track"><i id="prog"></i></div>
  </div>
  <div class="pg-right">
    <div class="kbdhint"><kbd>Tab</kbd>重听<span style="margin:0 4px">·</span><kbd>Enter</kbd>下一个</div>
    <div class="vdiv"></div>
    <label class="chk">语速 <select id="optRate"><option value="0.7">慢</option><option value="0.85" selected>较慢</option><option value="1">正常</option></select></label>
    <label class="chk">口音 <select id="optVoice"></select></label>
    <label class="chk"><input type="checkbox" id="optShuffle"> 乱序</label>
    <div class="vdiv"></div>
    <div class="toggles">
      <label class="chk"><input type="checkbox" id="tEn"> 原文</label>
      <label class="chk"><input type="checkbox" id="tCn" checked> 翻译</label>
    </div>
    <div class="seg"><button id="mList" class="on">列表</button><button id="mImm">沉浸</button></div>
    <button class="btn sm ghost" id="exitBtn">结束</button>
  </div>
</div>
</div>

<!-- ========== DASHBOARD ========== -->
<div class="wrap" id="dashView">
  <div class="hero">
    <div class="ring" id="heroRing"><span class="val" id="heroPct">0<small>%</small></span></div>
    <div class="heroInfo">
      <h1>雅思听力考词 · 全部 747 词</h1>
      <div class="heroStats">
        <div class="stat"><b id="stMastered">0</b>已掌握</div>
        <div class="stat"><b id="stLearning">0</b>学习中</div>
        <div class="stat"><b id="stNew">747</b>未学</div>
        <div class="stat"><b id="stAcc">—</b>历史正确率</div>
      </div>
      <div class="heroActs">
        <button class="btn primary" id="quickAll">🎧 全部练习</button>
        <button class="btn" id="quickWeak">⚡ 薄弱词专练</button>
        <button class="btn ghost" id="resetBtn">重置进度</button>
      </div>
    </div>
  </div>
  <div class="sectitle">📚 按章节学习</div>
  <div class="grid" id="chapterGrid"></div>
</div>

<!-- ========== CHAPTER DETAIL ========== -->
<div class="wrap hidden" id="chapterView">
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px">
    <button class="btn sm" id="backHome">← 返回</button>
    <h2 id="chTitle" style="margin:0;font-size:19px"></h2>
    <button class="btn primary sm" id="practiceChapter" style="margin-left:auto">🎧 练习整章</button>
    <button class="btn sm" id="practiceChapterWeak">⚡ 只练薄弱</button>
  </div>
  <div id="topicList"></div>
</div>

<!-- ========== PRACTICE ========== -->
<div class="list hidden" id="listView"></div>
<div class="imm hidden" id="immView">
  <div class="topic" id="immTopic"></div>
  <div class="bigspk" id="immSpk">🔊</div>
  <div class="immcn" id="immCn"></div>
  <div class="immen" id="immEn"></div>
  <input id="immInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="输入听到的单词…">
  <div class="fb" id="immFb"></div>
  <div class="ctrls">
    <button class="btn" id="immReplay">🔊 重听 (Tab)</button>
    <button class="btn primary" id="immCheck">检查 / 下一个 (Enter)</button>
    <button class="btn" id="immSkip">不会</button>
  </div>
</div>
<div class="result hidden" id="resultView"></div>

const CH = APP.chapters, TOPICS = APP.topics;

/* ---------- mastery store (localStorage, Leitner 0-5) ---------- */
const LSKEY='ielts_mastery_v2';
let store={};
try{store=JSON.parse(localStorage.getItem(LSKEY))||{};}catch(e){store={};}
function save(){try{localStorage.setItem(LSKEY,JSON.stringify(store));}catch(e){}}
function key(w){return w.toLowerCase().trim();}
function rec(w){return store[key(w)]||{box:0,seen:0,correct:0,wrong:0,streak:0,last:0};}
function grade(w,correct){
  const r=rec(w);r.seen++;r.last=Date.now();
  if(correct){r.correct++;r.streak++;r.box=Math.min(5,r.box+1);}
  else{r.wrong++;r.streak=0;r.box=Math.max(0,r.box-1);if(r.box>1)r.box=1;}
  store[key(w)]=r;save();
}
const MASTERED=b=>b>=4;      // box 4-5 = mastered
const LEARNING=b=>b>=1&&b<4; // box 1-3 = learning
/* progress for a set of words: returns {mastered,learning,newN,total,pct,accSeen,accCorrect} */
function stats(words){
  let m=0,l=0,n=0,seen=0,cor=0,boxSum=0;
  words.forEach(w=>{const r=rec(w.w);if(MASTERED(r.box))m++;else if(LEARNING(r.box))l++;else n++;seen+=r.seen;cor+=r.correct;boxSum+=r.box;});
  const total=words.length;
  return {mastered:m,learning:l,newN:n,total,
    pct:total?Math.round(boxSum/(5*total)*100):0,       // 连续"掌握度" = 平均盒子/5
    mpct:total?Math.round(m/total*100):0,               // 完全掌握占比
    lpct:total?Math.round(l/total*100):0,
    seen,cor,acc:seen?Math.round(cor/seen*100):null};
}
/* 三色分段进度条：掌握(绿)/学习中(琥珀)/未学(灰) */
function segBar(s){
  return '<div class="segbar">'
    +'<span style="width:'+s.mpct+'%;background:#22c55e"></span>'
    +'<span style="width:'+s.lpct+'%;background:var(--amber)"></span></div>';
}
function allWords(){const a=[];TOPICS.forEach(t=>t.words.forEach(w=>a.push(w)));return a;}
function chapterWords(ci){const a=[];TOPICS.forEach(t=>{if(t.ch===ci)t.words.forEach(w=>a.push(w));});return a;}

/* ---------- TTS ---------- */
let voices=[];
/* 过滤 macOS/Windows 上会说人话之外的特效/玩具语音 */
const NOVELTY_VOICES=/^(Albert|Bad News|Bahh|Bells|Boing|Bubbles|Cellos|Wobble|Fred|Good News|Jester|Junior|Kathy|Organ|Superstar|Trinoids|Whisper|Zarvox|Ralph|Deranged|Hysterical|Pipe Organ|Princess|Grandma|Grandpa|Rocko)( |$)/i;
/* 高质量英音优先级：越靠前越优先自动选 */
const VOICE_RANK=[
  /Google.*UK/i, /Microsoft.*(Libby|Sonia|Ryan).*en-GB/i,
  /^Daniel/i, /Microsoft.*George.*en-GB/i,
  /Google.*US/i, /Microsoft.*(Aria|Jenny|Guy)/i,
  /^Samantha/i, /^Karen/i, /^Moira/i,
];
function scoreVoice(v){
  if(NOVELTY_VOICES.test(v.name))return 999;
  const lang=v.lang.replace('_','-');
  if(!/^en\b/i.test(lang))return 900;               // 非英语最靠后
  for(let i=0;i<VOICE_RANK.length;i++) if(VOICE_RANK[i].test(v.name))return i;
  if(lang.toLowerCase().startsWith('en-gb'))return 50;
  if(lang.toLowerCase().startsWith('en-au'))return 55;
  if(lang.toLowerCase().startsWith('en-us'))return 60;
  return 80;
}
function loadVoices(){
  voices=speechSynthesis.getVoices();
  /* 只保留英语，且排除玩具音 */
  voices=voices.filter(v=>/^en\b/i.test(v.lang.replace('_','-'))&&!NOVELTY_VOICES.test(v.name));
  voices.sort((a,b)=>scoreVoice(a)-scoreVoice(b));
  const sel=document.getElementById('optVoice');sel.innerHTML='';
  voices.forEach(v=>{
    const o=document.createElement('option');o.value=v.name;
    const flag=/GB/i.test(v.lang)?'🇬🇧':/AU/i.test(v.lang)?'🇦🇺':/US/i.test(v.lang)?'🇺🇸':/IE/i.test(v.lang)?'🇮🇪':/IN/i.test(v.lang)?'🇮🇳':'🌐';
    const star=scoreVoice(v)<10?' ⭐':'';
    o.textContent=flag+' '+v.name.replace(/Microsoft |Google /,'')+star;
    sel.appendChild(o);
  });
  /* 恢复用户上次选择；若无则自动选评分最高（英音优先） */
  const saved=localStorage.getItem('ielts_voice');
  if(saved && voices.some(v=>v.name===saved)) sel.value=saved;
  else if(voices.length) sel.value=voices[0].name;
  sel.onchange=()=>localStorage.setItem('ielts_voice',sel.value);
}
speechSynthesis.onvoiceschanged=loadVoices;loadVoices();
let _audioEl=null;
function playFile(url,onFail){
  if(!_audioEl){_audioEl=new Audio();}
  _audioEl.pause();_audioEl.src=url;
  const r=parseFloat(document.getElementById('optRate').value)||0.9;
  _audioEl.playbackRate=Math.max(.5,Math.min(1.4,r*1.1));
  const p=_audioEl.play();
  if(p&&p.catch) p.catch(()=>onFail&&onFail());
}
function speak(t){
  const k=(t||'').toLowerCase().trim();
  const fn=AUDIO_MAP&&AUDIO_MAP[k];
  if(fn){
    playFile('audio/'+fn,()=>speakTTS(t));
    return;
  }
  speakTTS(t);
}
function speakTTS(t){
  if(!('speechSynthesis'in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  const v=voices.find(x=>x.name===document.getElementById('optVoice').value);
  if(v){u.voice=v;u.lang=v.lang;}else u.lang='en-GB';
  u.rate=parseFloat(document.getElementById('optRate').value)||0.9;
  u.pitch=1;u.volume=1;
  speechSynthesis.speak(u);
}
function norm(s){return (s||'').toLowerCase().replace(/\s+/g,' ').trim();}
function dotsHtml(box){let h='<span class="dots">';for(let i=1;i<=5;i++){const c=box>=i?(box>=4?'m':'f'):'';h+='<i class="'+c+'"></i>';}return h+'</span>';}

/* ---------- view switching ---------- */
const V=['dashView','chapterView','listView','immView','resultView'];
function hideAll(){V.forEach(id=>document.getElementById(id).classList.add('hidden'));}
function showPracticeChrome(on){
  document.getElementById('pbar').classList.toggle('hidden',!on);
}
function crumbHome(){return '<a onclick="goHome()">🏠 首页</a>';}
function goHome(){
  hideAll();showPracticeChrome(false);
  document.getElementById('dashView').classList.remove('hidden');
  document.getElementById('crumb').innerHTML='';
  renderDash();
}
window.goHome=goHome;window.openChapter=openChapter;
document.getElementById('homeBtn').onclick=goHome;
document.getElementById('backHome').onclick=goHome;

/* ---------- dashboard ---------- */
function renderDash(){
  const s=stats(allWords());
  document.getElementById('heroPct').innerHTML=s.pct+'<small>%</small>';
  document.getElementById('heroRing').style.setProperty('--p',s.pct);
  document.getElementById('heroRing').style.setProperty('--c',s.pct>=80?'var(--green)':'var(--accent)');
  document.getElementById('stMastered').textContent=s.mastered;
  document.getElementById('stLearning').textContent=s.learning;
  document.getElementById('stNew').textContent=s.newN;
  document.getElementById('stAcc').textContent=s.seen?Math.round(s.cor/s.seen*100)+'%':'—';
  const grid=document.getElementById('chapterGrid');grid.innerHTML='';
  CH.forEach((c,ci)=>{
    const cs=stats(chapterWords(ci));
    const card=document.createElement('div');card.className='chcard';
    card.innerHTML='<div class="miniring" style="--p:'+cs.pct+';--c:'+(cs.pct>=80?'var(--green)':'var(--accent)')+'"><span class="e">'+c.emoji+'</span></div>'
      +'<div class="chmeta"><div class="n">'+c.name+'</div>'
      +'<div class="s">掌握 '+cs.mastered+' · 学习中 '+cs.learning+' · 未学 '+cs.newN+(cs.acc!=null?' · 正确率 '+cs.acc+'%':'')+'</div>'
      +segBar(cs)+'</div>';
    card.onclick=()=>openChapter(ci);
    grid.appendChild(card);
  });
}

/* ---------- chapter detail ---------- */
let curChapter=0;
function openChapter(ci){
  curChapter=ci;hideAll();showPracticeChrome(false);
  document.getElementById('chapterView').classList.remove('hidden');
  document.getElementById('crumb').innerHTML=crumbHome()+'<span class="sep">›</span><span class="cur">'+CH[ci].emoji+' '+CH[ci].name+'</span>';
  document.getElementById('chTitle').textContent=CH[ci].emoji+' '+CH[ci].name;
  const list=document.getElementById('topicList');list.innerHTML='';
  TOPICS.forEach((t,ti)=>{
    if(t.ch!==ci)return;
    const ts=stats(t.words);
    const row=document.createElement('div');row.className='toprow';
    const accHtml=ts.acc!=null?'<span class="accpill '+(ts.acc>=80?'good':(ts.acc<60?'bad':''))+'">正确率 '+ts.acc+'%</span>':'<span class="accpill">未练习</span>';
    row.innerHTML='<div class="tinfo"><div class="tn">'+t.title+'</div>'
      +'<div class="ts">'+t.words.length+' 词 · 掌握 '+ts.mastered+' · 学习中 '+ts.learning+' · 未学 '+ts.newN+'</div>'
      +segBar(ts)+'</div>'
      +accHtml
      +'<div class="pctbadge '+(ts.pct>=80?'done':'')+'">'+ts.pct+'%</div>'
      +'<button class="btn primary sm">练习</button>';
    row.querySelector('button').onclick=(e)=>{e.stopPropagation();startPractice(t.words,t.title);};
    list.appendChild(row);
  });
}
document.getElementById('practiceChapter').onclick=()=>startPractice(chapterWords(curChapter),CH[curChapter].name+' · 整章');
document.getElementById('practiceChapterWeak').onclick=()=>{
  const w=chapterWords(curChapter).filter(x=>rec(x.w).box<4);
  if(!w.length){alert('本章已全部掌握 🎉');return;}
  startPractice(w,CH[curChapter].name+' · 薄弱词');
};
document.getElementById('quickAll').onclick=()=>{curChapter=null;startPractice(allWords(),'全部话题');};
document.getElementById('quickWeak').onclick=()=>{
  let w=allWords().filter(x=>rec(x.w).box<4);
  w.sort((a,b)=>rec(a.w).box-rec(b.w).box);
  w=w.slice(0,60);
  if(!w.length){alert('全部已掌握 🎉');return;}
  curChapter=null;startPractice(w,'薄弱词专练 (最多60词)');
};
document.getElementById('resetBtn').onclick=()=>{if(confirm('确定清空所有熟练度记录？')){store={};save();renderDash();}};

/* ---------- practice engine ---------- */
let mode='list',queue=[],results=[],immPos=0,immAnswered=false,curLabel='';
document.getElementById('mList').onclick=()=>setMode('list');
document.getElementById('mImm').onclick=()=>setMode('imm');
function setMode(m){mode=m;document.getElementById('mList').classList.toggle('on',m==='list');document.getElementById('mImm').classList.toggle('on',m==='imm');if(queue.length)render();}
document.getElementById('tEn').onchange=()=>{if(queue.length&&mode==='list')renderList();else if(queue.length)renderImm();};
document.getElementById('tCn').onchange=()=>{if(queue.length&&mode==='list')renderList();else if(queue.length)renderImm();};
document.getElementById('exitBtn').onclick=()=>{ if(curChapter!=null&&document.getElementById('crumb').innerHTML)openChapter(curChapter);else goHome();};

function startPractice(words,label){
  curLabel=label;
  queue=words.map(w=>({w:w.w,h:w.h}));
  if(document.getElementById('optShuffle').checked)
    for(let i=queue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[queue[i],queue[j]]=[queue[j],queue[i]];}
  results=queue.map(()=>({done:false,correct:false,your:''}));
  immPos=0;
  hideAll();showPracticeChrome(true);
  let cr=crumbHome();
  if(curChapter!=null) cr+='<span class="sep">›</span><a onclick="openChapter('+curChapter+')">'+CH[curChapter].emoji+' '+CH[curChapter].name+'</a>';
  cr+='<span class="sep">›</span><span class="cur">✍️ '+label+'</span>';
  document.getElementById('crumb').innerHTML=cr;
  render();
}
function updateProgress(){const d=results.filter(r=>r.done).length;document.getElementById('count').textContent=d+'/'+queue.length;document.getElementById('prog').style.width=(queue.length?d/queue.length*100:0)+'%';}
function render(){document.getElementById('resultView').classList.add('hidden');if(mode==='list')renderList();else renderImm();updateProgress();}

function rowInner(i){
  const item=queue[i],r=results[i],box=rec(item.w).box;
  const showEn=document.getElementById('tEn').checked,showCn=document.getElementById('tCn').checked;
  let inner='<span class="spk" data-i="'+i+'">🔊</span>';
  if(showEn)inner+='<span class="p-en">'+item.w+'</span>';
  if(showCn)inner+='<span class="p-cn">'+item.h+'</span>';
  if(!showEn&&!showCn)inner+='<span class="placeholder">🎧 听发音拼写</span>';
  inner+=dotsHtml(box);
  const af=r.done?(r.correct?'correct':'wrong'):'';
  return '<div class="idx">'+(i+1)+'</div>'
    +'<div class="prompt'+(showEn&&showCn?' p-both':'')+'">'+inner+'</div>'
    +'<div><div class="ansfield '+af+'"><input data-i="'+i+'" value="'+r.your.replace(/"/g,'&quot;')+'" '+(r.done?'readonly':'')+' autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="输入…">'
    +(r.done?('<span class="mark">'+(r.correct?'✓':'✗')+'</span>'):'<span class="cat">🐱</span>')+'</div>'
    +(r.done&&!r.correct?('<div class="sol">正确：<b>'+item.w+'</b></div>'):'')+'</div>';
}
function wireRow(el,i){
  el.querySelector('.spk').onclick=()=>speak(queue[i].w);
  const inp=el.querySelector('input');
  inp.addEventListener('focus',()=>{if(!results[i].done)speak(queue[i].w);});
  inp.addEventListener('keydown',e=>{
    if(e.isComposing||e.keyCode===229)return;              // 输入法(IME)组合中，忽略回车
    if(e.key==='Tab'){e.preventDefault();speak(queue[i].w);}
    else if(e.key==='Enter'){e.preventDefault();listCheck(i);}
  });
}
function renderList(){
  document.getElementById('immView').classList.add('hidden');document.getElementById('resultView').classList.add('hidden');
  const lv=document.getElementById('listView');lv.classList.remove('hidden');
  lv.innerHTML='';
  queue.forEach((item,i)=>{
    const row=document.createElement('div');row.className='item';row.id='it'+i;
    row.innerHTML=rowInner(i);
    lv.appendChild(row);wireRow(row,i);
  });
  const fu=queue.findIndex((_,i)=>!results[i].done);
  focusRow(fu>=0?fu:0,false);
}
function updateRow(i){
  const el=document.getElementById('it'+i);if(!el)return;
  el.innerHTML=rowInner(i);wireRow(el,i);
}
function focusRow(i,doSpeak){
  const el=document.getElementById('listView').querySelector('input[data-i="'+i+'"]');
  if(el){el.focus();el.select&&el.select();}
}
function listCheck(i){
  const item=queue[i],r=results[i];
  const el=document.getElementById('it'+i);const inp=el?el.querySelector('input'):null;
  const val=inp?inp.value.trim():'';
  if(!r.done && val){                       // 有输入才判分；空回车直接跳到下一个
    r.done=true;r.your=val;r.correct=norm(val)===norm(item.w);grade(item.w,r.correct);
    updateRow(i);updateProgress();
  }
  // 按位置前进到下一行；到末尾若还有未完成则收尾
  if(i<queue.length-1){focusRow(i+1,true);}
  else if(results.every(x=>x.done)){finish();}
  else{const fu=results.findIndex(x=>!x.done);if(fu>=0)focusRow(fu,true);}
}

function renderImm(){
  document.getElementById('listView').classList.add('hidden');document.getElementById('resultView').classList.add('hidden');
  const iv=document.getElementById('immView');iv.classList.remove('hidden');
  const fu=queue.findIndex((_,i)=>!results[i].done);if(fu>=0)immPos=fu;
  immAnswered=false;const item=queue[immPos];
  document.getElementById('immTopic').textContent=curLabel+'  '+dotsPlain(rec(item.w).box);
  document.getElementById('immCn').textContent=document.getElementById('tCn').checked?item.h:'';
  document.getElementById('immEn').textContent=document.getElementById('tEn').checked?item.w:'';
  const inp=document.getElementById('immInput');inp.value='';inp.className='';inp.disabled=false;inp.focus();
  document.getElementById('immFb').innerHTML='';document.getElementById('immCheck').textContent='检查 (Enter)';
  updateProgress();setTimeout(()=>speak(item.w),150);
}
function dotsPlain(box){let s='';for(let i=1;i<=5;i++)s+=box>=i?'●':'○';return s;}
function immCheck(){
  const item=queue[immPos],inp=document.getElementById('immInput');
  if(!immAnswered){const val=inp.value.trim();if(!val){speak(item.w);return;}
    immAnswered=true;inp.disabled=true;const correct=norm(val)===norm(item.w);
    results[immPos]={done:true,correct,your:val};grade(item.w,correct);
    const fb=document.getElementById('immFb');
    if(correct){inp.className='correct';fb.innerHTML='✅ <span class="ok">'+item.w+'</span> <span style="color:#4b5162">'+item.h+'</span>';}
    else{inp.className='wrong';fb.innerHTML='正确：<span class="ok">'+item.w+'</span><span class="bad">'+val+'</span> <span style="color:#4b5162">'+item.h+'</span>';}
    document.getElementById('immCheck').textContent='下一个 (Enter)';updateProgress();
  }else immNext();
}
function immNext(){const nxt=queue.findIndex((_,k)=>k>immPos&&!results[k].done);if(nxt>=0){immPos=nxt;renderImm();}else{const any=queue.findIndex((_,k)=>!results[k].done);if(any>=0){immPos=any;renderImm();}else finish();}}
document.getElementById('immCheck').onclick=immCheck;
document.getElementById('immReplay').onclick=()=>speak(queue[immPos].w);
document.getElementById('immSpk').onclick=()=>speak(queue[immPos].w);
document.getElementById('immSkip').onclick=()=>{if(immAnswered){immNext();return;}const item=queue[immPos],inp=document.getElementById('immInput');immAnswered=true;inp.disabled=true;inp.className='wrong';results[immPos]={done:true,correct:false,your:'（不会）'};grade(item.w,false);document.getElementById('immFb').innerHTML='正确：<span class="ok">'+item.w+'</span> <span style="color:#4b5162">'+item.h+'</span>';document.getElementById('immCheck').textContent='下一个 (Enter)';updateProgress();};
document.getElementById('immInput').addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();speak(queue[immPos].w);}else if(e.key==='Enter'){e.preventDefault();immCheck();}});

function finish(){
  const done=results.filter(r=>r.done),ok=done.filter(r=>r.correct).length;
  const wrong=queue.map((q,i)=>({q,r:results[i]})).filter(x=>x.r.done&&!x.r.correct);
  hideAll();showPracticeChrome(false);
  const rv=document.getElementById('resultView');rv.classList.remove('hidden');
  rv.innerHTML='<div class="card"><h2 style="margin:0">🎉 完成 · '+curLabel+'</h2>'
    +'<div class="score">'+ok+' / '+done.length+(done.length?'  ('+Math.round(ok/done.length*100)+'%)':'')+'</div>'
    +(wrong.length?('<div class="review"><h3>❌ 需复习 ('+wrong.length+')</h3>'+wrong.map(x=>'<div class="rw"><span><span class="ok">'+x.q.w+'</span> <span style="color:#4b5162">'+x.q.h+'</span></span><span class="your">你：'+x.r.your+'</span></div>').join('')+'</div>'):'<p style="color:var(--green)">🌟 全部正确！</p>')
    +'<div style="display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap">'
    +(wrong.length?'<button class="btn primary" id="rWrong">只练错词</button>':'')
    +'<button class="btn" id="rAgain">再来一次</button>'
    +(curChapter!=null?'<button class="btn" id="rChap">返回本章</button>':'')
    +'<button class="btn ghost" id="rHome">返回面板</button></div></div>';
  const rw=document.getElementById('rWrong');if(rw)rw.onclick=()=>startPractice(wrong.map(x=>({w:x.q.w,h:x.q.h})),curLabel+' · 错词');
  document.getElementById('rAgain').onclick=()=>startPractice(queue.map(q=>({w:q.w,h:q.h})),curLabel);
  const rc=document.getElementById('rChap');if(rc)rc.onclick=()=>openChapter(curChapter);
  document.getElementById('rHome').onclick=goHome;
}

/* init */
goHome();
</script>
